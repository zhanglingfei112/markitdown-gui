name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libegl1 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 markitdown[all]

      - name: Run tests
        run: python -m unittest tests.test_converter -v

  build:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: markitdown-gui-linux-x86_64
            separator: ":"
          - os: windows-latest
            asset_name: markitdown-gui-windows-x86_64.exe
            separator: ";"
          - os: macos-latest
            asset_name: markitdown-gui-macos-x86_64
            separator: ":"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libegl1 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 markitdown[all] pyinstaller

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          SEP="${{ matrix.separator }}"
          pyinstaller --noconfirm --onefile --windowed \
            --name "markitdown-gui" \
            --add-data "markitdown_gui/i18n/*.json"${SEP}"markitdown_gui/i18n" \
            --add-data "resources/styles/style.qss"${SEP}"resources/styles" \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtGui \
            --hidden-import markitdown \
            --collect-all markitdown_gui \
            markitdown_gui/main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "markitdown-gui" `
            --add-data "markitdown_gui/i18n/*.json;markitdown_gui/i18n" `
            --add-data "resources/styles/style.qss;resources/styles" `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtWidgets `
            --hidden-import PySide6.QtGui `
            --hidden-import markitdown `
            --collect-all markitdown_gui `
            markitdown_gui/main.py

      - name: Rename and prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          cp "dist/markitdown-gui" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"

      - name: Rename and prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: copy "dist\markitdown-gui.exe" "dist\${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MarkItDown GUI ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/markitdown-gui-linux-x86_64/markitdown-gui-linux-x86_64
            artifacts/markitdown-gui-windows-x86_64.exe/markitdown-gui-windows-x86_64.exe
            artifacts/markitdown-gui-macos-x86_64/markitdown-gui-macos-x86_64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
